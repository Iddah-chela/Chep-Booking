<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/favicon-512.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icons/favicon-256.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4F46E5" />
    <meta name="description" content="Find verified rental houses near University of Eldoret" />
    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PataKeja" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>PataKeja</title>
    <!-- Prevent FOUC: set bg immediately before any CSS loads -->
    <style>
      html, body { margin: 0; padding: 0; background: #ffffff; }
      html.dark, html.dark body { background: #111827; }
      /* Skeleton placeholder so the page isn't blank during JS parse */
      #root:empty::before {
        content: '';
        display: block;
        width: 100vw;
        height: 100vh;
        background: #ffffff;
      }
      html.dark #root:empty::before { background: #111827; }
    </style>
    <!-- Restore dark mode before first paint to prevent white flash -->
    <script>
      (function() {
        if (localStorage.getItem('PataKeja_darkMode') === 'true') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.background = '#111827';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.error('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
